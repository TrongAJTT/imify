name: Release Packages
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Existing tag to release (Semantic Versioning, e.g. v1.1.0)"
        required: true
        type: string
      release_title:
        description: "Release title"
        required: true
        type: string
      release_notes_file:
        description: "Path to release notes file in repo (supports .md/.txt). Leave empty to use assets/WHATS_NEW.md"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version_tag }}
          fetch-depth: 0

      - name: Validate release tag format
        id: release_meta
        shell: bash
        run: |
          TAG="${{ inputs.version_tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Input tag '$TAG' is not a valid semantic version"
            exit 1
          fi

          SEMVER="${TAG#v}"
          IS_PRERELEASE="false"
          if [[ "$SEMVER" == *"-rc"* ]]; then
            IS_PRERELEASE="true"
          fi

          echo "version=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${{ steps.release_meta.outputs.version }}"
          PACKAGE_VERSION="$(node -p "require('./apps/extension/package.json').version")"
          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag '${{ inputs.version_tag }}' does not match extension package version 'v$PACKAGE_VERSION'"
            exit 1
          fi

      - name: Read release notes from file
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="${{ inputs.release_notes_file }}"
          if [[ -z "$NOTES_FILE" ]]; then
            NOTES_FILE="assets/WHATS_NEW.md"
          fi
          if [[ ! -f "$NOTES_FILE" ]]; then
            echo "Release notes file not found: $NOTES_FILE"
            exit 1
          fi
          EXT="${NOTES_FILE##*.}"
          if [[ "$EXT" != "txt" && "$EXT" != "md" ]]; then
            echo "Release notes file must be .txt or .md: $NOTES_FILE"
            exit 1
          fi

          {
            echo "body<<EOF"
            cat "$NOTES_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync WASM assets
        run: pnpm --filter @imify/extension sync:assets

      - name: Build Chrome package
        run: pnpm --filter @imify/extension package:chrome

      - name: Build Edge package
        run: pnpm --filter @imify/extension exec plasmo build --target=edge-mv3 --zip

      - name: Build Firefox package
        run: pnpm --filter @imify/extension package:firefox

      - name: Prepare release artifacts
        shell: bash
        run: |
          VERSION_TAG="${{ inputs.version_tag }}"
          mkdir -p release-artifacts

          cp apps/extension/build/chrome-mv3-prod.zip "release-artifacts/imify-chrome-${VERSION_TAG}.zip"
          cp apps/extension/build/edge-mv3-prod.zip "release-artifacts/imify-edge-${VERSION_TAG}.zip"
          cp apps/extension/build/firefox-mv3-prod.zip "release-artifacts/imify-firefox-${VERSION_TAG}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: ${{ inputs.release_title }}
          body: ${{ steps.release_notes.outputs.body }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: |
            release-artifacts/imify-chrome-${{ inputs.version_tag }}.zip
            release-artifacts/imify-edge-${{ inputs.version_tag }}.zip
            release-artifacts/imify-firefox-${{ inputs.version_tag }}.zip
          fail_on_unmatched_files: true
