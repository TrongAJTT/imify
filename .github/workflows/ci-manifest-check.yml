name: CI Manifest Check

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  manifest-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate semantic version tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not a valid semantic version (expected e.g. v1.2.3 or v1.2.3-beta.1)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and verify target manifests
        run: pnpm --filter @imify/extension build:ci
